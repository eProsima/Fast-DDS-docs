# .readthedocs.yml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  apt_packages:
    - plantuml
    - swig
  jobs:
    # Generate the API reference sources (clone + doxygen + swig) ONCE, as a
    # dedicated, individually-logged build step, instead of on every
    # sphinx-build invocation from conf.py. `-u` keeps output unbuffered so
    # progress is visible in the raw log even if the build later times out.
    pre_build:
      - python -u docs/rtd_prepare.py

# Build documentation in the docs/ directory with Sphinx
sphinx:
  configuration: docs/conf.py

# Build documentation with MkDocs
#mkdocs:
#  configuration: mkdocs.yml

# Optionally build your docs in additional formats such as PDF and ePub
# ePub disabled to reduce build time; keep HTML zip and PDF.
formats:
  - htmlzip
  - pdf

# Optionally set the version of Python and requirements required to build your docs
python:
  install:
    - requirements: docs/requirements.txt
